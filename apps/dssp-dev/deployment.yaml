apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-dev
  labels:
    backstage.io/kubernetes-id: dssp-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-dev
  template:
    metadata:
      labels:
        app: dssp-dev
        backstage.io/kubernetes-id: dssp-dev
    spec:
      containers:
        - name: dssp-dev
          image: sureshmavp1/dssp-dev:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000