apiVersion: apps/v1
kind: Deployment
metadata:
  name: app11-sm-mar12
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app11-sm-mar12
  template:
    metadata:
      labels:
        app: app11-sm-mar12
    spec:
      containers:
        - name: app11-sm-mar12
          image: sureshmavp1/app11-sm-mar12:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000