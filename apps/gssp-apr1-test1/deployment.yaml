apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-apr1-test1
  labels:
    backstage.io/kubernetes-id: gssp-apr1-test1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-apr1-test1
  template:
    metadata:
      labels:
        app: gssp-apr1-test1
        backstage.io/kubernetes-id: gssp-apr1-test1
    spec:
      containers:
        - name: gssp-apr1-test1
          image: sureshmavp1/gssp-apr1-test1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000