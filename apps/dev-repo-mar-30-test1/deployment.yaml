apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-repo-mar-30-test1
  labels:
    backstage.io/kubernetes-id: dev-repo-mar-30-test1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dev-repo-mar-30-test1
  template:
    metadata:
      labels:
        app: dev-repo-mar-30-test1
        backstage.io/kubernetes-id: dev-repo-mar-30-test1
    spec:
      containers:
        - name: dev-repo-mar-30-test1
          image: sureshmavp1/dev-repo-mar-30-test1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000