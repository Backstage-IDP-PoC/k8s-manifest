apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2-mar16
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app2-mar16
  template:
    metadata:
      labels:
        app: app2-mar16
    spec:
      containers:
        - name: app2-mar16
          image: sureshmavp1/app2-mar16:1.0.4
          imagePullPolicy: Always
          ports:
            - containerPort: 3000